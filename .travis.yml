language: cpp

branches:
    only:
        - master

cache: ccache
git:
    depth: 1
    quiet: true

addons:
    apt:
        update: true
        packages:
          - python3 
          - python3-pip 
          - python3-setuptools
          - python3-wheel 
          - ninja-build
          - libx11-xcb-dev
          - libxcb-keysyms1-dev
          - libxcb-icccm4-dev
          - libxrandr-dev
          - libxcb-randr0-dev
          
    homebrew:
        update: true
        packages:
            - meson
        casks:
            - vulkan-sdk

before_install:
    - | 
      if [[ "$TRAVIS_OS_NAME" = "linux" ]]; then
        wget -qO - http://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-$VULKAN_SDK_VER-bionic.list http://packages.lunarg.com/vulkan/$VULKAN_SDK_VER/lunarg-vulkan-$VULKAN_SDK_VER-bionic.list
        sudo apt update
        sudo apt upgrade
        sudo apt install lunarg-vulkan-sdk
        sudo pip3 install --upgrade pip
        sudo pip3 install meson
      fi

jobs:
    include:
        - os: linux
          dist: bionic
          env: 
            - VULKAN_SDK_VER="1.2.135" 
          compiler:
            - clang
        - os: linux
          dist: bionic
          env: 
            - VULKAN_SDK_VER="1.2.135" 
          compiler:
            - gcc
        - os: osx
          osx_image: xcode11.3
        - os: osx
          osx_image: xcode11.2
        - os: osx
          osx_image: xcode11.1
        - os: osx
          osx_image: xcode11
        - os: osx
          osx_image: xcode10.3
        - os: osx
          osx_image: xcode10.2
        - os: osx
          osx_image: xcode10.1
        - os: osx
          osx_image: xcode10

script: meson builddir && ninja -C builddir